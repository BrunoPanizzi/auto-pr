name: Release PR

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# Runs recompute everything from scratch, but serialize them so two quick
# merges into dev can't race each other into creating duplicate release PRs.
concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - id: release-pr
        uses: ./
        with:
          groups: |
            OTF: Operação Terra Forte
            INFRA: Infraestrutura
            IND: Hortti Index
          ungrouped-label: Outros
          customer-heading: Novidades

      - name: Summary
        if: steps.release-pr.outputs.pr-number != ''
        run: |
          echo "Release PR: ${{ steps.release-pr.outputs.pr-url }} (${{ steps.release-pr.outputs.version }}, created=${{ steps.release-pr.outputs.created }})" >> "$GITHUB_STEP_SUMMARY"
