name: Novidades Command

# issue_comment workflows only run from the default branch's workflow file.
on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write

jobs:
  novidades:
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/novidades')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./novidades
