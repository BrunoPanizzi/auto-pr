name: 'auto-pr publish release'
description: >-
  Publishes a GitHub Release (version tag + frozen changelog) from a merged
  release PR created by the auto-pr action. Trigger it on closed pull
  requests targeting the production branch; non-release and unmerged PRs are
  ignored, and workflow_dispatch reruns republish the latest release safely.
author: 'BrunoPanizzi'
branding:
  icon: 'tag'
  color: 'purple'

inputs:
  github-token:
    description: >-
      Token used to read the merged release PR and create the tag + release.
      Needs `contents: write`.
    default: ${{ github.token }}
  base:
    description: 'Production branch the release PR targets.'
    default: 'master'
  head:
    description: 'Staging branch the release PR comes from.'
    default: 'dev'
  update-major-tag:
    description: >-
      When 'true', also force-moves the moving major tag (v1, v2, ...) to the
      release commit. Meant for repositories that publish actions or
      libraries consumed by tag, like this one.
    default: 'false'

outputs:
  release-url:
    description: 'URL of the published (or already existing) GitHub Release.'
  tag:
    description: 'Version tag of the release, e.g. v1.2.0.'

runs:
  using: 'node24'
  main: 'dist/index.cjs'
