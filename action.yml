name: 'auto-pr release PR'
description: >-
  Keeps an always-open release pull request from a staging branch to a
  production branch, with an auto-updated changelog of everything not yet
  deployed, a customer-facing changelog section, and an automatic version
  bump.
author: 'BrunoPanizzi'
branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  github-token:
    description: >-
      Token used to read merged PRs and create/update the release PR.
      Needs `pull-requests: write`.
    default: ${{ github.token }}
  base:
    description: 'Production branch the release PR targets.'
    default: 'master'
  head:
    description: 'Staging branch the release PR comes from.'
    default: 'dev'
  initial-version:
    description: >-
      Version used for the very first release PR, when no previously merged
      release PR exists.
    default: 'v0.1.0'
  bump:
    description: >-
      Version component bumped when creating a new release PR: major, minor,
      or patch.
    default: 'minor'
  groups:
    description: >-
      Optional newline-separated mapping of PR title prefixes to display
      names, e.g. "OTF: Operação Terra Forte". When set, changelog entries
      are grouped by the acronym before the dash in each PR title, under the
      mapped name. All-caps prefixes missing from the mapping get a group
      under the raw acronym; when empty, the changelog is a flat list.
    default: ''
  ungrouped-label:
    description: >-
      Group heading used for PRs whose title has no recognizable prefix.
      Only used when `groups` is set.
    default: 'Other'
  customer-heading:
    description: >-
      Heading of the customer-facing changelog section, built from the notes
      authors write between `<!-- changelog:begin -->` and
      `<!-- changelog:end -->` markers in PR bodies. The section is omitted
      when no pending PR has notes.
    default: 'Customer changelog'

outputs:
  pr-number:
    description: 'Number of the open release PR (empty if there was nothing to release).'
  pr-url:
    description: 'URL of the open release PR (empty if there was nothing to release).'
  version:
    description: 'Current title of the release PR, human edits included.'
  created:
    description: 'Whether this run created the release PR (true) or updated an existing one (false).'

runs:
  using: 'node24'
  main: 'dist/index.cjs'
